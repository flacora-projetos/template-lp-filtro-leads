        <main>
          <h1>Dra. Karyne Magalhães — Diagnóstico especializado da halitose (mau hálito) em Goiânia</h1>
          <p>
            Consulta especializada no diagnóstico da halitose com avaliação clínica e tecnologia.
            Para acabar com o mau hálito de verdade, o primeiro passo é descobrir a causa — são mais de 60 possíveis.
            A avaliação inclui exame odontológico completo, sialometria (avaliação do fluxo e da qualidade salivar)
            e medição objetiva dos gases do hálito com OralChroma.
          </p>
          <h2>Sobre a Dra. Karyne Magalhães</h2>
          <p>
            Cirurgiã-dentista graduada pela Universidade de Uberaba em 2004, especialista em Halitose e em Prótese Dentária,
            com qualificação específica no diagnóstico e tratamento das alterações do hálito e das disfunções salivares.
            É coordenadora e professora do curso "Reconhecendo e tratando o mau hálito" e integra a Associação Brasileira de
            Halitose como membro e conselheira. Registro profissional CRO-GO 7954.
          </p>
          <h2>Atendimento</h2>
          <p>
            Atendimento presencial, reservado e individualizado em Goiânia.
            Rua Terezina, 40, Ed. Essenciale Premier, Sala 701, Alto da Glória, Goiânia - GO, CEP 74815-715, Brasil.
            Avaliação 5,0 no Google com mais de 250 avaliações. Contato pelo WhatsApp (62) 99932-0675.
          </p>
          <h2>Perguntas frequentes</h2>
          <p><strong>Mau hálito tem cura?</strong> Sim. Na grande maioria dos casos o mau hálito tem cura ou controle adequado, a depender da causa. O primeiro passo é um diagnóstico preciso da origem do problema.</p>
          <p><strong>Mau hálito vem do estômago?</strong> As causas estomacais são minoria; grande parte tem origem bucal. Existe tratamento adequado independentemente da causa identificada.</p>
          <p><strong>Preciso de preparo antes da consulta?</strong> É importante estar há pelo menos 21 dias sem antibióticos, pois o uso recente pode interferir nos resultados da avaliação.</p>
          <p><strong>Quem mora em outra cidade pode se consultar?</strong> Sim, muitos pacientes vêm de fora. Recomenda-se informar a origem no contato para organizar a viagem a Goiânia.</p>
